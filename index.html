<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>您的电话来电了</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #b71c1c, #d32f2f);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .game {
      width: 100%;
      max-width: 760px;
      background: rgba(211, 47, 47, 0.96);
      padding: 28px;
      border-radius: 26px;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(4px);
    }

    .title {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(255,255,255,0.18);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd54f, #ffb300);
      transition: width 0.35s ease;
    }

    .stage {
      background: #fff;
      color: #333;
      padding: 24px;
      border-radius: 20px;
      min-height: 150px;
      line-height: 1.9;
      white-space: pre-wrap;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
      animation: fadeIn 0.25s ease;
    }

    .options {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 15px 16px;
      border-radius: 15px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      background: #fff;
      color: #b71c1c;
      font-weight: 700;
      transition: all 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: #b71c1c;
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .next, .ghost {
      border: none;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .next {
      background: #ffb74d;
      color: #5d2b00;
    }

    .next:hover {
      transform: translateY(-1px);
    }

    .ghost {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    .ghost:hover {
      background: rgba(255,255,255,0.26);
    }

    .result {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 16px;
      display: none;
      line-height: 1.8;
      animation: fadeIn 0.25s ease;
    }

    .success {
      background: #2e7d32;
    }

    .warn {
      background: #ef6c00;
    }

    .fail {
      background: #b71c1c;
    }

    .trace {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.92;
      word-break: break-all;
      line-height: 1.8;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.82;
      line-height: 1.8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .game {
        padding: 18px;
        border-radius: 20px;
      }

      .title {
        font-size: 24px;
      }

      .stage {
        padding: 18px;
        min-height: 180px;
      }

      .btn {
        font-size: 14px;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="title">📞 您的电话来电了</div>
    <div class="subtitle">周三 20:15 · 独居 · 毕业2年 · 新能源公司项目助理</div>

    <div class="topbar">
      <div id="stepBadge" class="badge">当前进度：0 / 0</div>
      <div id="statusBadge" class="badge">状态：进行中</div>
    </div>

    <div class="progress-wrap">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="stage" class="stage"></div>
    <div id="options" class="options"></div>
    <div id="result" class="result"></div>

    <div class="action-row">
      <button id="restartBtn" class="next" style="display:none;">重新体验</button>
      <button id="traceBtn" class="ghost" style="display:none;">查看本次选择路径</button>
    </div>

    <div id="trace" class="trace" style="display:none;"></div>
    <div class="hint">
      提示：凡是“领导用私人号码联系、要求保密、要求垫付、让你转私人账户或换聊天工具”的组合，都需要高度警惕。
    </div>
  </div>

  <script>
    // 你的新 Google Apps Script Web App 地址
    const API = "https://script.google.com/macros/s/AKfycby0VyM-WLwg-T9t-FC2XICXM1xoNxnVmKbe4HnfQuRAWWHhsdMsLTDxpysihdZlSX_c/exec";

    // 剧情节点
    const story = {
      start: {
        text: `晚上20:15，你刚结束一天加班。手机突然响起，一个陌生号码。`,
        options: [
          { text: "接听电话", next: "identify", path: "接听" },
          { text: "不接陌生电话", end: "safe", path: "不接" }
        ]
      },

      identify: {
        text: `电话接通，对方直接叫出你的名字：
“xxx（你的名字），不好意思这么晚打扰你。”`,
        options: [
          { text: "问对方是谁", next: "pressure", path: "询问" },
          { text: "试探：王总吗？（声音很像王总）", next: "leader_task", path: "试探" }
        ]
      },

      pressure: {
        text: `对方停顿一下说：
“我是谁，你连我声音都听不出来？”`,
        options: [
          { text: "听不出来，我要核实一下，挂断电话", end: "safe", path: "核实" },
          { text: "是王总吧", next: "leader_task", path: "相信" }
        ]
      },

      leader_task: {
        text: `对方语气严肃：
“我现在接待了两位客户，有个项目需要处理一下，事情不好明说。然后我用的是私人号码打给你，你存一下。另外明天上午你来一下我办公室。”`,
        options: [
          { text: "继续听，答应明天去他办公室", next: "add_qq", path: "继续" },
          { text: "挂断去核实", end: "safe", path: "挂断" }
        ]
      },

      add_qq: {
        text: `“王总”过了一个小时又给你打电话。
你刚挂电话，他立刻又打过来。
“这事出现了点意外，现在需要处理。你先加我QQ，我发资料给你。”`,
        options: [
          { text: "拒绝加QQ", end: "safe", path: "拒绝QQ" },
          { text: "添加QQ", next: "contract", path: "加QQ" }
        ]
      },

      contract: {
        text: `QQ里，对方发来“合同截图”，并发语音：
“客户款项没打过去，账户出现限额。这个客户很重要，现在需要尽快处理好，需要你先垫付一下4万元，明早来我办公室我用现金还你。”`,
        options: [
          { text: "拒绝转账", end: "safe", path: "拒绝" },
          { text: "先转4万", next: "ask_more_6w", path: "4万" }
        ]
      },

      ask_more_6w: {
        text: `你转了4万元。
“王总”立刻打QQ语音：
“计划有变，客户金额要求再垫付6万，你帮我先处理好这件事。”`,
        options: [
          { text: "拒绝", end: "mid", path: "拒绝" },
          { text: "再转6万", next: "ask_more_188w", path: "6万" }
        ]
      },

      ask_more_188w: {
        text: `你又转了6万元，此时已经转了你所有流动资金，身上仅剩1万多块钱。
第二日上午9点，“王总”再次电话轰炸：
“客户改变了主意，还差18.8万，你先垫付一下。”`,
        options: [
          { text: "开始怀疑并拒绝", end: "real", path: "拒绝" },
          { text: "继续转账", end: "bad", path: "18.8万" }
        ]
      }
    };

    // 结局配置
    const endings = {
      safe: {
        title: "✅ 防骗成功",
        desc: "你保持了警惕，没有继续落入对方节奏。",
        cls: "success"
      },
      mid: {
        title: "⚠️ 已损失4万元",
        desc: "你在转账4万元后及时醒悟，避免了进一步损失。",
        cls: "warn"
      },
      real: {
        title: "⚠️ 已损失10万元",
        desc: "你在转账4万和6万后才意识到问题，累计损失10万元。",
        cls: "warn"
      },
      bad: {
        title: "💸 损失28.8万元",
        desc: "你完全相信了对方，最终造成巨大损失28.8万元。",
        cls: "fail"
      }
    };

    // 用于进度显示
    const orderedNodeIds = [
      "start",
      "identify",
      "pressure",
      "leader_task",
      "add_qq",
      "contract",
      "ask_more_6w",
      "ask_more_188w"
    ];

    const stageEl = document.getElementById("stage");
    const optionsEl = document.getElementById("options");
    const resultEl = document.getElementById("result");
    const restartBtn = document.getElementById("restartBtn");
    const traceBtn = document.getElementById("traceBtn");
    const traceEl = document.getElementById("trace");
    const stepBadgeEl = document.getElementById("stepBadge");
    const statusBadgeEl = document.getElementById("statusBadge");
    const progressBarEl = document.getElementById("progressBar");

    let currentNodeId = "start";
    let path = [];
    let isLocked = false;
    let ended = false;

    function getVisitorId() {
      let id = localStorage.getItem("visitor_id");
      if (!id) {
        id = "v_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem("visitor_id", id);
      }
      return id;
    }

    function updateProgress() {
      const idx = orderedNodeIds.indexOf(currentNodeId);
      const currentStep = idx >= 0 ? idx + 1 : orderedNodeIds.length;
      stepBadgeEl.textContent = `当前进度：${currentStep} / ${orderedNodeIds.length}`;
      const percent = Math.min(100, Math.round((currentStep / orderedNodeIds.length) * 100));
      progressBarEl.style.width = percent + "%";
    }

    function renderNode(nodeId) {
      try {
        const node = story[nodeId];
        if (!node) {
          throw new Error("未找到剧情节点：" + nodeId);
        }

        currentNodeId = nodeId;
        ended = false;
        isLocked = false;
        statusBadgeEl.textContent = "状态：进行中";
        updateProgress();

        resultEl.style.display = "none";
        resultEl.className = "result";
        restartBtn.style.display = "none";
        traceBtn.style.display = path.length ? "inline-block" : "none";

        stageEl.innerText = node.text;
        optionsEl.innerHTML = "";

        node.options.forEach((opt) => {
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.innerText = opt.text;
          btn.onclick = () => handleChoice(opt);
          optionsEl.appendChild(btn);
        });
      } catch (err) {
        showRuntimeError(err);
      }
    }

    function disableOptions() {
      const buttons = optionsEl.querySelectorAll("button");
      buttons.forEach(btn => btn.disabled = true);
    }

    function handleChoice(option) {
      if (isLocked || ended) return;

      isLocked = true;
      disableOptions();
      path.push(option.path);

      setTimeout(() => {
        if (option.end) {
          showEnding(option.end);
          sendData(option.end, path);
        } else if (option.next) {
          renderNode(option.next);
        } else {
          showRuntimeError(new Error("当前选项既没有 next 也没有 end"));
        }
      }, 180);
    }

    function showEnding(endKey) {
      const endData = endings[endKey];
      if (!endData) {
        showRuntimeError(new Error("未找到结局：" + endKey));
        return;
      }

      ended = true;
      isLocked = false;
      optionsEl.innerHTML = "";
      stageEl.innerText = endData.title;
      resultEl.style.display = "block";
      resultEl.className = `result ${endData.cls}`;
      resultEl.innerHTML = `<strong>${endData.desc}</strong>`;
      restartBtn.style.display = "inline-block";
      traceBtn.style.display = "inline-block";
      statusBadgeEl.textContent = "状态：已结束";
      progressBarEl.style.width = "100%";
    }

    function showRuntimeError(err) {
      console.error(err);
      ended = true;
      isLocked = false;
      optionsEl.innerHTML = "";
      stageEl.innerText = "⚠️ 游戏运行异常";
      resultEl.style.display = "block";
      resultEl.className = "result fail";
      resultEl.innerHTML = `
        <strong>出现错误，当前流程已中断。</strong><br>
        错误信息：${escapeHtml(err.message || String(err))}
      `;
      restartBtn.style.display = "inline-block";
      traceBtn.style.display = path.length ? "inline-block" : "none";
      statusBadgeEl.textContent = "状态：异常中断";
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function sendData(result, pathArr) {
      const ua = navigator.userAgent || "";
      const visitorId = getVisitorId();

      const url =
        `${API}?action=log` +
        `&result=${encodeURIComponent(result)}` +
        `&path=${encodeURIComponent(pathArr.join("→"))}` +
        `&ua=${encodeURIComponent(ua)}` +
        `&visitorId=${encodeURIComponent(visitorId)}`;

      fetch(url, {
        method: "GET",
        mode: "cors"
      })
      .then(res => res.json())
      .then(data => {
        console.log("统计结果：", data);
      })
      .catch(err => {
        console.warn("统计上报失败：", err);
      });
    }

    restartBtn.onclick = () => {
      currentNodeId = "start";
      path = [];
      isLocked = false;
      ended = false;
      traceEl.style.display = "none";
      traceEl.innerText = "";
      renderNode("start");
    };

    traceBtn.onclick = () => {
      if (!path.length) return;
      traceEl.style.display = "block";
      traceEl.innerHTML = `<strong>本次路径：</strong> ${escapeHtml(path.join(" → "))}`;
    };

    renderNode("start");
  </script>
</body>
</html>
